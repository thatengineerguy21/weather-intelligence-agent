sources:
  weather-bq-source:
    kind: bigquery
    project: YOUR_GCP_PROJECT_ID

tools:
  get_city_weather:
    kind: bigquery-sql
    source: weather-bq-source
    description: >
      Fetches historical weather data for a specific city or station name.
      element: TMAX (max temp), TMIN (min temp), PRCP (precipitation/rainfall),
      SNOW (snowfall), SNWD (snow depth).
      Values are in tenths of original unit, divide by 10 for real value.
      country_prefix: 2-letter country code e.g. US, IN, GM, CA, AU.
      station_keyword: partial city name in uppercase e.g. NEW YORK, CHICAGO, MUMBAI.
      month: integer 1-12.
      year: 4 digit year e.g. 2023.
    statement: |
      SELECT
        s.name AS station_name,
        s.state,
        AVG(d.value) / 10.0 AS avg_value,
        MAX(d.value) / 10.0 AS max_value,
        MIN(d.value) / 10.0 AS min_value,
        COUNT(*) AS reading_count
      FROM `bigquery-public-data.ghcn_d.ghcnd_2023` d
      JOIN `bigquery-public-data.ghcn_d.ghcnd_stations` s ON d.id = s.id
      WHERE d.element = @element
        AND EXTRACT(MONTH FROM d.date) = @month
        AND STARTS_WITH(d.id, @country_prefix)
        AND UPPER(s.name) LIKE CONCAT('%', @station_keyword, '%')
        AND d.qflag IS NULL
      GROUP BY s.name, s.state
      ORDER BY avg_value DESC
      LIMIT 10
    parameters:
      - name: element
        type: string
        description: "TMAX, TMIN, PRCP, SNOW or SNWD"
      - name: month
        type: integer
        description: "Month as integer 1-12"
      - name: country_prefix
        type: string
        description: "2-letter country prefix e.g. US, IN, GM, CA"
      - name: station_keyword
        type: string
        description: "Uppercase partial city name e.g. NEW YORK, CHICAGO"

  get_country_weather:
    kind: bigquery-sql
    source: weather-bq-source
    description: >
      Fetches aggregated weather data for an entire country when no specific
      city is mentioned. Returns top stations by value.
      country_prefix: 2-letter country code e.g. US, IN, GM, CA, AU.
      element: TMAX, TMIN, PRCP, SNOW, SNWD.
      month: integer 1-12.
    statement: |
      SELECT
        s.name AS station_name,
        s.state,
        AVG(d.value) / 10.0 AS avg_value,
        MAX(d.value) / 10.0 AS max_value,
        MIN(d.value) / 10.0 AS min_value,
        COUNT(*) AS reading_count
      FROM `bigquery-public-data.ghcn_d.ghcnd_2023` d
      JOIN `bigquery-public-data.ghcn_d.ghcnd_stations` s ON d.id = s.id
      WHERE d.element = @element
        AND EXTRACT(MONTH FROM d.date) = @month
        AND STARTS_WITH(d.id, @country_prefix)
        AND d.qflag IS NULL
      GROUP BY s.name, s.state
      ORDER BY avg_value DESC
      LIMIT 10
    parameters:
      - name: element
        type: string
        description: "TMAX, TMIN, PRCP, SNOW or SNWD"
      - name: month
        type: integer
        description: "Month as integer 1-12"
      - name: country_prefix
        type: string
        description: "2-letter country prefix e.g. US, IN, GM, CA"

toolsets:
  weather_toolset:
    - get_city_weather
    - get_country_weather