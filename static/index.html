<!DOCTYPE html>
<html>
<head>
  <title>Weather Intelligence Agent</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
    input { width: 70%; padding: 10px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; background: #4285f4; color: white; border: none; cursor: pointer; }
    #response { margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 8px; min-height: 50px; }
    .loading { color: #888; }
  </style>
</head>
<body>
  <h1>🌤️ Weather Intelligence Agent</h1>
  <p>Ask questions about historical weather data powered by NOAA & BigQuery</p>
  <p>Ask for Specific City for any month and year</p>
  <p>You can ask about following variables: Rainfall, Maximum Temperature, Minimum Temperature, Snowfall and Snow Depth</p>
  <div>
    <input type="text" id="question" placeholder="e.g. What was the rainfall in New York in June 2023?" />
    <button onclick="ask()">Ask</button>
  </div>
  <div id="response">Your answer will appear here...</div>

  <script>
    async function ask() {
      const question = document.getElementById('question').value;
      const responseDiv = document.getElementById('response');
      
      if (!question) return;
      
      responseDiv.innerHTML = '<span class="loading">Querying NOAA weather data...</span>';
      
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });
      
      const data = await res.json();
      responseDiv.innerHTML = data.answer || data.error;
    }

    // Allow Enter key to submit
    document.getElementById('question').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') ask();
    });
  </script>
</body>
</html>
